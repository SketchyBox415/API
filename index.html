<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puter Chatbot</title>

<script src="https://js.puter.com/v2/"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 60%;
  padding: 10px 15px;
  margin: 10px 0;
  border-radius: 15px;
}

.user {
  background: #238636;
  align-self: flex-end;
}

.bot {
  background: #30363d;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #161b22;
}

#userInput {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 8px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #238636;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let messages = [];

async function sendMessage() {
  const inputBox = document.getElementById("userInput");
  const text = inputBox.value;
  if (!text) return;

  addMessage(text, "user");
  inputBox.value = "";

  messages.push({ role: "user", content: text });

  const reply = await puter.ai.chat(messages, {
    model: "gpt-5-nano"
  });

  messages.push({ role: "assistant", content: reply });

  addMessage(reply, "bot");
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
