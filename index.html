<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Chatbot</title>

<script src="https://js.puter.com/v2/"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Code Highlight -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0d1117, #161b22);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 65%;
  padding: 12px 16px;
  margin: 8px 0;
  border-radius: 18px;
  line-height: 1.4;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.3s ease;
}

.user {
  background: linear-gradient(135deg, #238636, #2ea043);
  align-self: flex-end;
}

.bot {
  background: rgba(255,255,255,0.08);
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.1);
}

#userInput {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 10px;
  background: #0d1117;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border: none;
  background: linear-gradient(135deg, #238636, #2ea043);
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.typing {
  opacity: 0.6;
  font-style: italic;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.message {
  white-space: pre-wrap;
}

/* Code block styling */
pre {
  background: #0d1117;
  padding: 12px;
  border-radius: 10px;
  overflow-x: auto;
  position: relative;
}

code {
  font-family: monospace;
}

/* Copy button */
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #238636;
  border: none;
  padding: 5px 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let messages = [];
let loading = false;

// Convert markdown → HTML
function renderMarkdown(text) {
  return marked.parse(text);
}

// Add copy buttons to code blocks
function addCopyButtons() {
  document.querySelectorAll("pre").forEach(block => {
    if (block.querySelector(".copy-btn")) return;

    const btn = document.createElement("button");
    btn.innerText = "Copy";
    btn.className = "copy-btn";

    btn.onclick = () => {
      const code = block.innerText;
      navigator.clipboard.writeText(code);
      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = "Copy", 1000);
    };

    block.appendChild(btn);
  });
}

// Typing effect (markdown safe)
async function typeMarkdown(element, text) {
  let current = "";

  for (let i = 0; i < text.length; i++) {
    current += text[i];

    element.innerHTML = renderMarkdown(current);
    hljs.highlightAll();
    addCopyButtons();

    if (i % 3 === 0) {
      await new Promise(r => setTimeout(r, 5));
    }
  }
}

// Send message
async function sendMessage() {
  if (loading) return;

  const inputBox = document.getElementById("userInput");
  const text = inputBox.value;
  if (!text.trim()) return;

  loading = true;

  addMessage(text, "user");
  inputBox.value = "";

  messages.push({ role: "user", content: text });

  const typingMsg = addMessage("Typing...", "bot typing");

  try {
    const response = await puter.ai.chat(messages, {
      model: "gpt-5-nano"
    });

    let reply = "";

    if (typeof response === "string") {
      reply = response;
    } else if (response?.message?.content) {
      reply = response.message.content;
    } else if (response?.choices?.[0]?.message?.content) {
      reply = response.choices[0].message.content;
    } else {
      reply = JSON.stringify(response);
    }

    messages.push({ role: "assistant", content: reply });

    typingMsg.classList.remove("typing");

    // Fast render for long replies
    if (reply.length > 500) {
      typingMsg.innerHTML = renderMarkdown(reply);
      hljs.highlightAll();
      addCopyButtons();
    } else {
      await typeMarkdown(typingMsg, reply);
    }

  } catch (err) {
    typingMsg.innerText = "⚠️ Error: " + err.message;
  }

  loading = false;
}

// Add message
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "message " + type;

  if (type.includes("user")) {
    msg.innerText = text;
  } else {
    msg.innerHTML = renderMarkdown(text);
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  return msg;
}

// Enter key
document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
